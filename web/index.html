<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechDex — The Developer Tool Catalog</title>
<meta name="description" content="213+ industry-standard tools, platforms, and frameworks explained in plain English. Search by name or describe what you need — semantic AI search finds the right tool.">
<link rel="canonical" href="https://www.techdex.dev/">
<!-- Open Graph -->
<meta property="og:type"        content="website">
<meta property="og:url"         content="https://www.techdex.dev/">
<meta property="og:site_name"   content="TechDex">
<meta property="og:title"       content="TechDex — The Developer Tool Catalog">
<meta property="og:description" content="213+ industry-standard tools, platforms, and frameworks explained in plain English. Semantic AI search — describe what you need, get the right tool.">
<!-- Twitter Card -->
<meta name="twitter:card"        content="summary">
<meta name="twitter:url"         content="https://www.techdex.dev/">
<meta name="twitter:title"       content="TechDex — The Developer Tool Catalog">
<meta name="twitter:description" content="213+ tools explained in plain English. Semantic AI search. Grows automatically every day.">
<link rel="icon" type="image/svg+xml" href="assets/brand/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/brand/techdex-icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/brand/techdex-icon-16.png">
<link rel="apple-touch-icon" sizes="128x128" href="assets/brand/techdex-icon-128.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app/styles.css">
<link rel="stylesheet" href="app/directions.css">
<style>
  /* embed mode hides app-level chrome so the frame shows the dex itself */
  html.embed .topbar .ctl-sort,
  html.embed .topbar .ctl-dir,
  html.embed .topbar #modeToggle { display: none; }
</style>
</head>
<body>
<div class="app" data-dir="tty" data-mode="dark">

  <!-- ===================== TOPBAR ===================== -->
  <header class="topbar">
    <div class="brand">
      <img src="assets/brand/techdex-icon.svg" alt="" class="brand-icon" aria-hidden="true">
      <div>
        <span class="nm"><b>tech</b>dex</span>
        <span class="site-url">techdex.dev</span>
      </div>
    </div>

    <label class="search">
      <span class="prompt">❯</span>
      <input id="q" type="text" placeholder="search the dex — name, what it does, who uses it…" autocomplete="off" spellcheck="false" aria-label="Search entries">
      <span class="clr" id="clear" title="clear">✕</span>
      <span class="kbd">/</span>
      <button id="aiBtn" class="ai-btn" type="button" title="semantic AI search — describe what you need, then click (or ctrl+enter)">✦ AI</button>
    </label>

    <div class="topbtns">
      <div class="segmented ctl-sort" title="sort">
        <button data-setsort="dex" class="on">default</button>
        <button data-setsort="name">a–z</button>
        <button data-setsort="domain">domain</button>
      </div>
    </div>
  </header>

  <!-- ===================== BODY ===================== -->
  <div class="body">
    <aside class="sidebar">
      <div class="side-h"><span>domains</span></div>
      <div id="domains"></div>
      <div class="side-sep"></div>
      <div class="side-h"><span>category</span></div>
      <div class="cat-row" id="cats"></div>
    </aside>

    <main class="main">
      <div class="main-head">
        <div class="main-title" id="mainTitle">all <span class="accent">entries</span></div>
        <div class="main-sub" id="mainSub"></div>
      </div>
      <div class="grid" id="grid"></div>
    </main>
  </div>

  <!-- ===================== STATUSBAR ===================== -->
  <footer class="statusbar" id="status"></footer>
</div>

<!-- ===================== DETAIL DRAWER ===================== -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-label="Entry detail">
  <div class="drawer-bar">
    <span class="path" id="drawerPath"></span>
    <span class="x" id="drawerClose" title="close (esc)">esc ✕</span>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- thumbnail for standalone bundling -->
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#171616"/>
    <text x="50" y="62" font-family="monospace" font-size="46" fill="#96d8e3" text-anchor="middle">⚡</text>
  </svg>
</template>

<div id="tweaks-root"></div>

<script src="data/entries.js"></script>
<script src="app/meta.js"></script>
<script src="app/semantic-search.js"></script>
<script src="app/app.js"></script>

<!-- Tweaks panel (React) — design knobs that bridge into the vanilla app -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" data-presets="react">
/* TechDex — Tweaks panel. Bridges design knobs into window.TechDexAPI (vanilla app). */
(function () {
const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakToggle, TweakColor } = window;
const API = window.TechDexAPI || { set() {}, prefs: {} };
const P = API.prefs || {};
const ACCENT_HEX = { cyan: "#7fe3f2", pink: "#f7a6d3", lavender: "#d2a4f5", yellow: "#f0dc74" };
const HEX_ACCENT = Object.fromEntries(Object.entries(ACCENT_HEX).map(([k, v]) => [v.toLowerCase(), k]));
const FS_BY_DENSITY = { compact: 12.5, regular: 14, comfy: 16 };
const DENSITY_BY_FS = (fs) => (fs <= 13 ? "compact" : fs >= 15.5 ? "comfy" : "regular");

const TWEAK_DEFAULTS = {
  density: DENSITY_BY_FS(P.fs || 14),
  accent: ACCENT_HEX[P.accent] || "#7fe3f2",
  font: P.font || "JetBrains Mono",
  scanlines: P.scanlines !== undefined ? P.scanlines : true,
};

function TweaksApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Appearance" />
      <TweakColor label="Accent" value={t.accent} options={["#7fe3f2", "#f7a6d3", "#d2a4f5", "#f0dc74"]}
        onChange={(v) => { setTweak("accent", v); API.set("accent", HEX_ACCENT[v.toLowerCase()] || "cyan"); }} />
      <TweakToggle label="Scanlines" value={t.scanlines}
        onChange={(v) => { setTweak("scanlines", v); API.set("scanlines", v); }} />
      <TweakSection label="Layout" />
      <TweakRadio label="Density" value={t.density} options={["compact", "regular", "comfy"]}
        onChange={(v) => { setTweak("density", v); API.set("fs", FS_BY_DENSITY[v]); }} />
      <TweakSelect label="Mono font" value={t.font} options={["JetBrains Mono", "IBM Plex Mono"]}
        onChange={(v) => { setTweak("font", v); API.set("font", v); }} />
    </TweaksPanel>
  );
}
ReactDOM.createRoot(document.getElementById("tweaks-root")).render(<TweaksApp />);
})();
</script>
</body>
</html>
